name: Update Coder Template

on:
  push:
    branches:
      - main

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tools_json: ${{ steps.determine-tools.outputs.tools_to_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed directories (for Main branch push)
        id: changed-tools
        uses: tj-actions/changed-files@v46
        with:
          files: |
            src/**/*.*
          dir_names: true
          dir_names_max_depth: 2
          json: true

      - name: List all changed files
        env:
          ALL_FILES: ${{ steps.changed-tools.outputs.all_changed_files }}
        run: |
          for file in ${ALL_FILES}; do
            echo "$file was found"
          done

      - name: Set final tools to build output
        id: determine-tools
        run: |
          TOOLS_TO_BUILD="[]"
          IS_TAG_PUSH="false"

          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Detected Main Branch Push: Building changed tools."
            echo "Changed files: ${{ steps.changed-tools.outputs.all_changed_files }}"
            ALL_TOOLS=$(echo "${{ steps.changed-tools.outputs.all_changed_files }}" | jq -r '.[]' | awk -F '/' '{print $2}' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            TOOLS_TO_BUILD="$ALL_TOOLS"
          else
            echo "Unsupported event or branch: ${{ github.event_name }} on ${{ github.ref }}. Exiting."
            exit 0
          fi

          if [[ -z "$TOOLS_TO_BUILD" || "$TOOLS_TO_BUILD" == "null" ]]; then
            TOOLS_TO_BUILD="[]"
          fi

          echo "tools_to_build=$TOOLS_TO_BUILD" >> $GITHUB_OUTPUT
          echo "Final tools list: $TOOLS_TO_BUILD"

  update:
    needs: prepare
    runs-on: ubuntu-latest
    if: ${{ fromJSON(needs.prepare.outputs.tools_json)[0] }}
    strategy:
      fail-fast: false
      matrix:
        template-id: ${{ fromJSON(needs.prepare.outputs.tools_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest commit hash
        id: latest_commit
        run: echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get commit title
        id: commit_title
        run: echo "title=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT

      - name: Update Coder Template
        uses: matifali/update-coder-template@v3
        with:
          id: ${{ matrix.template-id }}
          dir: src/${{ matrix.template-id }}
          url: ${{ secrets.CODER_URL }}
          name: ${{ steps.latest_commit.outputs.hash }}
          message: ${{ steps.commit_title.outputs.title }}
          coder_session_token: ${{ secrets.CODER_SESSION_TOKEN }}
